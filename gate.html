<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyOwnFraming — The Vestibule</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep: #07080b;
    --night: #0c0e14;
    --ember: #c8864a;
    --ember-dim: #7a5230;
    --gold: #c9a84c;
    --mist: #8a8d99;
    --light: #e2ddd5;
    --light-dim: #a09c94;
  }

  html, body {
    height: 100%;
    background: var(--deep);
    color: var(--light);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  /* ── BACKGROUND ATMOSPHERE ── */
  .bg {
    position: fixed; inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  /* Moon / radiance source */
  .bg::before {
    content: '';
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(ellipse at center,
      rgba(180, 130, 60, 0.12) 0%,
      rgba(140, 90, 40, 0.06) 40%,
      transparent 70%
    );
    animation: moonpulse 6s ease-in-out infinite;
  }

  /* Ground mist */
  .bg::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(to top,
      rgba(200, 134, 74, 0.04) 0%,
      transparent 100%
    );
  }

  @keyframes moonpulse {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.08); }
  }

  /* Floating particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(200, 134, 74, 0.15);
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(110vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
  }

  /* ── CONTENT ── */
  #vestibule {
    position: relative; z-index: 10;
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    transition: opacity 1.2s ease;
  }

  #vestibule.dissolve {
    opacity: 0;
    pointer-events: none;
  }

  /* Thin horizontal rule — marks the threshold */
  .threshold-line {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, var(--ember-dim), transparent);
    margin-bottom: 2.5rem;
    animation: linefade 3s ease-in-out infinite;
  }

  @keyframes linefade {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .site-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--mist);
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  .main-phrase {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.6rem, 5vw, 3rem);
    color: var(--light-dim);
    text-align: center;
    line-height: 1.4;
    letter-spacing: 0.05em;
    max-width: 520px;
    margin-bottom: 0.6rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.6s forwards;
  }

  .main-phrase em {
    font-style: italic;
    color: var(--light);
  }

  .sub-phrase {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    color: var(--ember-dim);
    text-align: center;
    letter-spacing: 0.08em;
    margin-bottom: 4rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.9s forwards;
  }

  /* ── ENTER INTERACTION ── */
  .enter-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 1.2rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.3s forwards;
  }

  #enterBtn {
    background: transparent;
    border: 1px solid var(--ember-dim);
    color: var(--light-dim);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 1rem 2.5rem;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.4s, border-color 0.4s;
  }

  #enterBtn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(200, 134, 74, 0.07);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
  }

  #enterBtn:hover {
    color: var(--ember);
    border-color: var(--ember);
  }

  #enterBtn:hover::before {
    transform: translateX(0);
  }

  .turn-back {
    font-size: 0.75rem;
    font-style: italic;
    color: var(--ember-dim);
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: color 0.3s;
    background: none; border: none;
    font-family: 'Cormorant Garamond', serif;
  }

  .turn-back:hover { color: var(--mist); }

  /* ── FOOTER ── */
  .vestibule-footer {
    position: fixed;
    bottom: 1.5rem; left: 0; right: 0;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: var(--ember-dim);
    opacity: 0;
    animation: fadeUp 1s ease 1.8s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── TRANSITION OVERLAY ── */
  #overlay {
    position: fixed; inset: 0;
    background: var(--deep);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
  }

  #overlay.closing {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div id="overlay"></div>

<div id="vestibule">
  <div class="threshold-line"></div>
  <div class="site-label">Welcome,</div>

  <div class="main-phrase">
    Just around the corner,<br><em>will be the real gate.</em>
  </div>

  <div class="sub-phrase">
    Feel free to enter -- This frame is for minding pace.
  </div>

  <div class="enter-wrap">
    <button id="enterBtn">I understand — enter</button>
    <button class="turn-back" onclick="history.back()">turn back</button>
  </div>
</div>

<div class="vestibule-footer">© 2026 MYOWNFRAMING — BD_TRANSLATION_LAYER AHEAD</div>

<script>
  // ── Floating particles ──
  const bg = document.querySelector('.bg');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 15 + 12}s;
      animation-delay: ${Math.random() * 10}s;
      --drift: ${(Math.random() - 0.5) * 80}px;
    `;
    bg.appendChild(p);
  }

  // ── Enter logic ──
  document.getElementById('enterBtn').addEventListener('click', () => {
    const overlay = document.getElementById('overlay');
    const vestibule = document.getElementById('vestibule');
    vestibule.classList.add('dissolve');
    overlay.classList.add('closing');
    setTimeout(() => {
      window.location.href = 'myownai.html';
    }, 1000);
  });
</script>
</body>
</html>
