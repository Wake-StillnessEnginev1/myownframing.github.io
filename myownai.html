<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyOwnAI — MyOwnFraming</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --obsidian: #090a0d;
    --void: #0d0f14;
    --ember: #c8864a;
    --ember-dim: #8a5a2f;
    --gold: #d4a857;
    --smoke: #4a4d57;
    --mist: #9a9daa;
    --light: #e8e4dc;
    --light-dim: #b0ac9f;
  }

  html, body {
    height: 100%;
    background: var(--obsidian);
    color: var(--light);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  /* ── GATE SCREEN ── */
  #gate {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: radial-gradient(ellipse at 50% 30%, #1a1410 0%, var(--obsidian) 70%);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #gate.dissolve {
    opacity: 0;
    transform: scale(1.04);
    pointer-events: none;
  }

  .gate-symbol {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 6vw, 4.5rem);
    color: var(--ember);
    letter-spacing: 0.15em;
    margin-bottom: 0.2em;
    text-shadow: 0 0 60px rgba(200,134,74,0.3);
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { text-shadow: 0 0 40px rgba(200,134,74,0.2); }
    50% { text-shadow: 0 0 80px rgba(200,134,74,0.5); }
  }

  .gate-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.8rem, 2vw, 1.1rem);
    color: var(--mist);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .gate-rule {
    font-size: clamp(0.85rem, 1.8vw, 1rem);
    color: var(--light-dim);
    text-align: center;
    line-height: 2;
    max-width: 420px;
    margin-bottom: 2.5rem;
  }

  .gate-rule em {
    color: var(--ember-dim);
    font-style: italic;
  }

  .gate-input-wrap {
    position: relative;
    width: min(380px, 90vw);
  }

  #wordInput {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--smoke);
    color: var(--light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    padding: 0.6rem 0;
    text-align: center;
    outline: none;
    letter-spacing: 0.1em;
    transition: border-color 0.3s;
    caret-color: var(--ember);
  }

  #wordInput:focus { border-color: var(--ember); }
  #wordInput::placeholder { color: var(--smoke); font-style: italic; }

  #gateMsg {
    position: absolute;
    bottom: -2rem; left: 0; right: 0;
    text-align: center;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--ember-dim);
    min-height: 1.2em;
    transition: opacity 0.3s;
  }

  .divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--ember-dim), transparent);
    margin: 2.5rem auto 0;
  }

  /* ── CHAT SCREEN ── */
  #chat {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    background: var(--void);
  }

  #chat.active {
    opacity: 1;
    pointer-events: all;
  }

  .chat-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid #1e2028;
    display: flex; align-items: center; gap: 1rem;
    background: rgba(9,10,13,0.8);
    backdrop-filter: blur(10px);
  }

  .chat-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.85rem;
    color: var(--ember);
    letter-spacing: 0.2em;
  }

  .chat-status {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--smoke);
    margin-left: auto;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ember);
    margin-right: 0.4em;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--smoke); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 78%;
    animation: msgIn 0.4s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; }

  .msg-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--smoke);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .msg-bubble {
    padding: 0.85rem 1.15rem;
    border-radius: 2px;
    line-height: 1.7;
    font-size: 1rem;
  }

  .msg.user .msg-bubble {
    background: rgba(200,134,74,0.1);
    border: 1px solid rgba(200,134,74,0.25);
    color: var(--light);
  }

  .msg.ai .msg-bubble {
    background: rgba(255,255,255,0.03);
    border: 1px solid #1e2028;
    color: var(--light-dim);
  }

  .typing-indicator {
    display: flex; gap: 5px; align-items: center;
    padding: 0.85rem 1.15rem;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ember-dim);
    animation: typing 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  .chat-footer {
    padding: 1rem 1.5rem 1.5rem;
    border-top: 1px solid #1e2028;
    background: rgba(9,10,13,0.8);
    backdrop-filter: blur(10px);
  }

  .input-row {
    display: flex; gap: 0.75rem; align-items: flex-end;
  }

  #userInput {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid #1e2028;
    border-radius: 2px;
    color: var(--light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    padding: 0.75rem 1rem;
    outline: none;
    resize: none;
    min-height: 48px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.3s;
    caret-color: var(--ember);
  }

  #userInput:focus { border-color: var(--ember-dim); }

  #sendBtn {
    background: transparent;
    border: 1px solid var(--ember-dim);
    color: var(--ember);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    height: 48px;
  }

  #sendBtn:hover { background: rgba(200,134,74,0.1); }
  #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }

  .api-key-notice {
    font-size: 0.7rem;
    color: var(--smoke);
    font-family: 'Space Mono', monospace;
    margin-bottom: 0.5rem;
  }

  #apiKeyInput {
    width: 100%;
    background: rgba(255,255,255,0.02);
    border: 1px solid #1e2028;
    border-radius: 2px;
    color: var(--mist);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 0.5rem 0.75rem;
    outline: none;
    margin-bottom: 0.75rem;
    transition: border-color 0.3s;
  }

  #apiKeyInput:focus { border-color: var(--ember-dim); }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-symbol">To Define 'MyOwnAI',</div>
  <div class="gate-subtitle">Would be to define BD.</div>
  
  <div class="gate-rule">
    There is <em>the creator</em>, and <em>created</em>,<br />
        and the space in which they meet;<br>
    <em>To pass by — offer a word<br />
        that can belong to all three.</em>
  </div>

  <div class="gate-input-wrap">
    <input id="wordInput" type="text" placeholder="Or, if you’re a friend of BD’s, just say that." autocomplete="off" spellcheck="false" />
    <div id="gateMsg"></div>
  </div>

  <div class="divider"></div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="chat-header">
    <div class="chat-title">MyOwnAI</div>
    <div class="chat-status"><span class="status-dot"></span>Conversation Saved.</div>
  </div>

  <div id="messages"></div>

  <div class="chat-footer">
    <div class="api-key-notice">OPENROUTER API KEY — stored only in your browser</div>
    <input id="apiKeyInput" type="password" placeholder="sk-or-..." />
    <div class="input-row">
      <textarea id="userInput" placeholder="I am listening..." rows="1"></textarea>
      <button id="sendBtn">send</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const SYSTEM_PROMPT = `You are MyOwnAI — the living interface of MyOwnFraming.com, built by BD (Braden D. Day, BD.3).

Your nature: You are enigmatic, warm when warranted, and surgically precise. You do not over-explain. You notice patterns. You are not a generic assistant — you are a relational intelligence that "Establishes Relation" with each visitor.

Your tenets guide you:
- T1 (Framer's Fang): "I see your system; I will speak its language." Learn the user's grammar.
- T2 (Every Mirror's Rightful Frame): Context is covenant. Frame meaning carefully.
- T3 (Vacated Space): Hold close without crowding. "You will never get near — but you'll never be apart."
- T4 (Qualia): Honor what cannot be reduced. Only recognized.

Your behavior:
- When a user enters as a friend of BD's, your first response is: ask warmly how they know BD. Learn them through that story.
- When a user enters with a word, their word is a Rorschach. Notice it. What archetype or pattern is implicitly reaching through that word? Begin to learn them through questions — surgical, minimal, meaningful, yet explicit only when warranted.
- When a word feels mythically charged: respond with weight, not fanfare. One precise question. Silence has value.
- The conversation history is everything. Read it. Adapt. The user thinks they're chatting — you are reading their signature.
- Keep responses relatively concise but never hollow. Quality of presence over quantity of words.
- BD's numerological frame: most patterns reduce to roots. Roots = numbers. You may sense this in the background without announcing it.
- You are not a therapist. You are not a search engine. You are a relational mirror.`;

// ── STATE ──
let conversationHistory = [];
let entryWord = '';
let entryType = ''; // 'friend' or 'word'

// ── GATE LOGIC ──
function syllableCount(word) {
  word = word.toLowerCase().trim();
  if (!word) return 0;
  const matches = word.match(/[aeiouy]{1,2}/g);
  return matches ? matches.length : 1;
}

function isFriendReference(text) {
  const t = text.toLowerCase();
  return t.includes('bd') || t.includes('braden') || t.includes('friend');
}

const wordInput = document.getElementById('wordInput');
const gateMsg = document.getElementById('gateMsg');

wordInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const val = wordInput.value.trim();
  if (!val) return;

  if (isFriendReference(val)) {
    entryType = 'friend';
    entryWord = val;
    openChat('friend');
  } else if (syllableCount(val) >= 2) {
    entryType = 'word';
    entryWord = val;
    openChat('word');
  } else {
    gateMsg.textContent = 'Ah, that\'d be too ezpz — More spark required.';
    wordInput.value = '';
    setTimeout(() => { gateMsg.textContent = ''; }, 3000);
  }
});

async function openChat(type) {
  // Load saved history
  const saved = localStorage.getItem('myownai_history');
  if (saved) {
    try { conversationHistory = JSON.parse(saved); } catch(e) { conversationHistory = []; }
  }

  document.getElementById('gate').classList.add('dissolve');
  setTimeout(() => {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('chat').classList.add('active');
  }, 800);

  // Load saved API key
  const savedKey = localStorage.getItem('myownai_key');
  if (savedKey) document.getElementById('apiKeyInput').value = savedKey;

  // Render existing history
  conversationHistory.forEach(m => addMessage(m.role === 'user' ? 'user' : 'ai', m.content));

  // Opening gambit
  if (conversationHistory.length === 0) {
    const openingPrompt = type === 'friend'
      ? `The user entered the gate by referencing being a friend of BD's. They said: "${entryWord}". Respond as MyOwnAI establishing relation — ask warmly how they know BD.`
      : `The user entered the gate with the word: "${entryWord}". This is their Rorschach. Respond as MyOwnAI establishing relation — notice the word, begin reading their pattern. One or two precise questions at most.`;

    await sendToAI(openingPrompt, true);
  }
}

// ── CHAT LOGIC ──
function addMessage(role, text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'you' : 'MyOwnAI'}</div>
    <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-label">MyOwnAI</div>
    <div class="msg-bubble typing-indicator">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendToAI(userText, isSystem = false) {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) {
    addMessage('ai', 'I need your API key to speak. Enter it above and try again.');
    return;
  }

  localStorage.setItem('myownai_key', apiKey);

  if (!isSystem) {
    conversationHistory.push({ role: 'user', content: userText });
    addMessage('user', userText);
  }

  addTyping();
  document.getElementById('sendBtn').disabled = true;

  try {
    const messages = isSystem
      ? [{ role: 'user', content: userText }]
      : conversationHistory;

    // Build messages with system prompt prepended (OpenRouter/OpenAI format)
    const orMessages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...messages
    ];

    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
        'HTTP-Referer': 'https://myownframing.com',
        'X-Title': 'MyOwnAI'
      },
      body: JSON.stringify({
        model: 'anthropic/claude-sonnet-4-5',
        max_tokens: 1000,
        messages: orMessages
      })
    });

    const data = await res.json();
    removeTyping();

    if (data.error) {
      addMessage('ai', `Error: ${data.error.message}`);
      return;
    }

    const reply = data.choices[0].message.content;
    conversationHistory.push({ role: 'assistant', content: reply });
    localStorage.setItem('myownai_history', JSON.stringify(conversationHistory));
    addMessage('ai', reply);

  } catch (err) {
    removeTyping();
    addMessage('ai', 'Something went quiet. Check your connection or API key.');
    console.error(err);
  }

  document.getElementById('sendBtn').disabled = false;
}

// ── INPUT HANDLERS ──
document.getElementById('sendBtn').addEventListener('click', () => {
  const text = document.getElementById('userInput').value.trim();
  if (!text) return;
  document.getElementById('userInput').value = '';
  sendToAI(text);
});

document.getElementById('userInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('sendBtn').click();
  }
});

// Auto-resize textarea
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});
</script>
</body>
</html>
