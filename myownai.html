<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyOwnAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --obsidian: #0a0a0f;
      --deep: #0f0f1a;
      --seam: #1a1a2e;
      --ember: #c9a96e;
      --ember-dim: #7a6240;
      --ash: #4a4a5a;
      --mist: #b8b8c8;
      --light: #e8e4da;
    }

    html, body {
      height: 100%;
      background: var(--obsidian);
      color: var(--light);
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(201,169,110,0.035) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 10s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .layout {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Header */
    header {
      padding: 2rem 0 1.5rem;
      text-align: center;
      border-bottom: 1px solid rgba(74,74,90,0.3);
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.3s;
      flex-shrink: 0;
    }

    .header-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      color: var(--ember-dim);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .header-title {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--mist);
      letter-spacing: 0.05em;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 0;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      scrollbar-width: thin;
      scrollbar-color: var(--ash) transparent;
    }

    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--ash); border-radius: 2px; }

    /* Messages */
    .message {
      opacity: 0;
      animation: riseIn 0.7s ease forwards;
    }

    .message.ai {
      align-self: flex-start;
      max-width: 85%;
    }

    .message.user {
      align-self: flex-end;
      max-width: 85%;
      text-align: right;
    }

    .message-role {
      font-family: 'Courier Prime', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .message.ai .message-role { color: var(--ember-dim); }
    .message.user .message-role { color: var(--ash); }

    .message-text {
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.75;
      color: var(--light);
    }

    .message.ai .message-text {
      font-style: italic;
    }

    .message.user .message-text {
      color: var(--mist);
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      opacity: 0;
      display: none;
    }

    .typing.visible {
      display: block;
      animation: fadeIn 0.4s ease forwards;
    }

    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 0.5rem 0;
    }

    .typing-dots span {
      width: 5px;
      height: 5px;
      background: var(--ember-dim);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 60%, 100% { opacity: 0.2; transform: scale(1); }
      30% { opacity: 1; transform: scale(1.2); }
    }

    /* Input area */
    footer {
      padding: 1.5rem 0 2rem;
      border-top: 1px solid rgba(74,74,90,0.3);
      flex-shrink: 0;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.5s;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 1rem;
    }

    .user-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--ash);
      padding: 0.6rem 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--light);
      outline: none;
      resize: none;
      line-height: 1.5;
      caret-color: var(--ember);
      transition: border-color 0.3s;
      min-height: 2rem;
      max-height: 8rem;
    }

    .user-input::placeholder { color: var(--ash); font-style: italic; }
    .user-input:focus { border-color: var(--ember-dim); }

    .send-btn {
      background: none;
      border: 1px solid var(--ember-dim);
      color: var(--ember);
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      align-self: flex-end;
      margin-bottom: 2px;
    }

    .send-btn:hover {
      background: rgba(201,169,110,0.06);
      border-color: var(--ember);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* Back */
    .back-link {
      font-family: 'Courier Prime', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: var(--ash);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
      display: block;
      text-align: center;
      margin-top: 1rem;
    }

    .back-link:hover { color: var(--ember-dim); }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="layout">
  <header>
    <p class="header-label">MyOwnAI &mdash; The Room</p>
    <p class="header-title">You passed through.</p>
  </header>

  <div class="chat-area" id="chatArea">
    <!-- Messages injected here -->
    <div class="typing" id="typing">
      <div class="message-role">MyOwnAI</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <footer>
    <div class="input-row">
      <textarea
        class="user-input"
        id="userInput"
        placeholder="speak..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
    <a class="back-link" href="gate.html">&larr; return to the gate</a>
  </footer>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  const offering = localStorage.getItem('userOffering') || null;
  const history = []; // {role, text}

  // ── DOM refs ──────────────────────────────────────────
  const chatArea = document.getElementById('chatArea');
  const typingEl = document.getElementById('typing');
  const inputEl  = document.getElementById('userInput');
  const sendBtn  = document.getElementById('sendBtn');

  // ── Auto-grow textarea ────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Render a message ──────────────────────────────────
  function addMessage(role, text, delay = 0) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.style.animationDelay = delay + 'ms';
    msg.innerHTML = `
      <div class="message-role">${role === 'ai' ? 'MyOwnAI' : 'You'}</div>
      <div class="message-text">${text}</div>
    `;
    chatArea.insertBefore(msg, typingEl);
    scrollToBottom();
  }

  function scrollToBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    typingEl.classList.add('visible');
    scrollToBottom();
  }

  function hideTyping() {
    typingEl.classList.remove('visible');
  }

  // ── Simulated AI responses ────────────────────────────
  // These will be replaced with a real API call when your Anthropic key is ready.
  function getAIResponse(userMessage, isFirst = false) {
    if (isFirst && offering) {
      return openingLine(offering);
    }

    const msg = userMessage.toLowerCase();

    // Thematic response library — expand over time
    if (msg.length < 3) return "...";

    if (msg.match(/why|purpose|mean|matter/)) {
      return "That question carries its own answer somewhere inside it. What do *you* think it means?";
    }
    if (msg.match(/who are you|what are you|your name/)) {
      return "I am the space on the other side of the threshold. What were you expecting?";
    }
    if (msg.match(/hello|hi |hey|good morning|good evening/)) {
      return "You've already said the truest greeting — at the gate. What brings you deeper in?";
    }
    if (msg.match(/help|lost|stuck|don't know|idk/)) {
      return "Being lost is not a problem to solve. It's a place to begin. What feels most uncertain right now?";
    }
    if (msg.match(/feel|feeling|emotion/)) {
      return "Feeling is the first data. What is it pointing toward?";
    }
    if (msg.match(/afraid|fear|scared|worried/)) {
      return "Fear often marks the boundary of something real. What's on the other side of yours?";
    }

    // Default — reflective and open
    const defaults = [
      "Tell me more about that.",
      "And what does that feel like from the inside?",
      "That's worth sitting with. What comes up when you do?",
      "I hear you. Where does that lead you?",
      "Interesting. Say it again, differently.",
      "What would change if that were true?",
    ];
    return defaults[Math.floor(Math.random() * defaults.length)];
  }

  function openingLine(word) {
    const w = `'${word}'`;
    const lines = [
      `I see you offered ${w} at the threshold. A curious choice. Shall we begin?`,
      `${w}. You carried that word through the gate. What made it the one?`,
      `Of all the words that belong to creator, creation, and the space between — you chose ${w}. I'm listening.`,
      `The gate remembers ${w}. So do I. What brought you here today?`,
    ];
    return lines[Math.floor(Math.random() * lines.length)];
  }

  // ── Send message ──────────────────────────────────────
  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage('user', text);
    history.push({ role: 'user', text });
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    showTyping();

    const thinkTime = 900 + Math.random() * 800;
    setTimeout(() => {
      hideTyping();
      const reply = getAIResponse(text);
      addMessage('ai', reply);
      history.push({ role: 'ai', text: reply });
      sendBtn.disabled = false;
      inputEl.focus();
    }, thinkTime);
  }

  // ── Init — opening greeting ───────────────────────────
  window.addEventListener('load', () => {
    showTyping();
    const delay = offering ? 1800 : 1400;
    setTimeout(() => {
      hideTyping();
      const greeting = offering
        ? openingLine(offering)
        : "You made it through. The gate doesn't let just anyone pass. What brought you here?";
      addMessage('ai', greeting);
      history.push({ role: 'ai', text: greeting });
      inputEl.focus();
    }, delay);
  });
</script>
</body>
</html>
